name: workflow-self-heal

# The daily autonomous self-heal routine (Layer 3 of the workflow-self-heal
# system), split into two jobs (economics master plan P0.5):
#
#   gate — keyless ($0, no model call): checks the five monitored scheduled
#     workflows via the GitHub API (latest decisive conclusion on main,
#     staleness vs expected cadence, disabled state) and writes the
#     SELFHEAL_BEACON heartbeat. Green days end here.
#
#   heal — the Claude Code agent against docs/runbooks/workflow-self-heal.md,
#     pinned to claude-haiku-4-5 (mechanical triage; JUDGMENT items are
#     PR-and-stop anyway). Runs ONLY when the gate found red — previously the
#     agent ran unpinned every day, green or not (an observed green-day run
#     selected an Opus-class model: $0.39 for "nothing is red").
#
# Cost: gate $0/run daily; heal ≈ $0.02–0.10/run (Haiku) × observed red-day
# rate (~1–2/week) ≈ $0.2–0.8/month — replaces ~$5–15/month unpinned-daily.
#
# Why GitHub Actions (not a claude.ai Routine): the fixer needs gh + a real dev
# env to run pytest, open PRs, and merge. The claude.ai Routine env has no gh CLI
# (that is what killed the daily-plan routine's beacon).
#
# REQUIRED SECRET: SELFHEAL_PAT — a PAT (repo scope, + Variables: write) used so
# (a) PRs the routine opens actually trigger the `test` CI gate (PRs created by the
# default GITHUB_TOKEN do NOT trigger workflows, so they could never be merged on
# green), (b) the gate can write the SELFHEAL_BEACON repo variable (the default
# GITHUB_TOKEN cannot write Actions variables). Without it the gate still detects
# (keyless reads work) but the heartbeat write degrades to a loud warning and the
# hourly observer flags the stale beacon within 26h — the meta-guard working.

on:
  schedule:
    - cron: '0 13 * * *'   # daily 13:00 UTC (~9am ET) — after the 09:17 canary
  workflow_dispatch: {}

concurrency:
  group: workflow-self-heal
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      red_count: ${{ steps.detect.outputs.red_count }}
      red_names: ${{ steps.detect.outputs.red_names }}
    steps:
      - name: Detect red / stale / disabled workflows (keyless)
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          now_epoch=$(date -u +%s)
          RED_NAMES=""
          CHECKED=0

          check_wf() {
            local wf="$1" horizon="$2"
            CHECKED=$((CHECKED + 1))

            local state
            state=$(gh api "repos/${REPO}/actions/workflows/${wf}" --jq '.state' 2>/dev/null || echo "fetch_error")
            if [ "$state" = "fetch_error" ]; then
              echo "::warning::${wf}: could not fetch workflow — counting as red"
              RED_NAMES="${RED_NAMES},${wf}(fetch_error)"; return
            fi
            if [ "$state" != "active" ]; then
              RED_NAMES="${RED_NAMES},${wf}(disabled:${state})"; return
            fi

            local runs_json
            runs_json=$(gh api "repos/${REPO}/actions/workflows/${wf}/runs?branch=main&per_page=15" 2>/dev/null) || {
              echo "::warning::${wf}: could not list runs — counting as red"
              RED_NAMES="${RED_NAMES},${wf}(fetch_error)"; return
            }

            # A stale schedule is an outage even when no run is marked failed
            # (runbook §1): newest run of ANY status older than the horizon.
            local newest_created
            newest_created=$(echo "$runs_json" | jq -r '.workflow_runs[0].created_at // empty')
            if [ -z "$newest_created" ]; then
              RED_NAMES="${RED_NAMES},${wf}(no_runs)"; return
            fi
            local newest_epoch age
            newest_epoch=$(date -u -d "$newest_created" +%s)
            age=$((now_epoch - newest_epoch))
            if [ "$age" -gt "$horizon" ]; then
              RED_NAMES="${RED_NAMES},${wf}(stale:$((age / 3600))h)"; return
            fi

            # Latest DECISIVE run on main: success/failure/timed_out/
            # startup_failure; ignore cancelled + in-progress (runbook §1).
            local conclusion
            conclusion=$(echo "$runs_json" | jq -r '[.workflow_runs[]
              | select(.status == "completed")
              | select(.conclusion == "success" or .conclusion == "failure"
                       or .conclusion == "timed_out" or .conclusion == "startup_failure")
              ][0].conclusion // "none"')
            case "$conclusion" in
              failure|timed_out|startup_failure)
                RED_NAMES="${RED_NAMES},${wf}(${conclusion})" ;;
            esac
          }

          # Horizons = expected cadence + grace. bot: 6 cycles/day + hourly
          # queue → 6h. voice-regression: daily canary → 48h. sentinel:
          # hourly → 6h. refresh-thresholds: weekly Sunday → 8d.
          # time-travel-canary: weekly Monday → 8d.
          check_wf "bot.yml" 21600
          check_wf "voice-regression.yml" 172800
          check_wf "source-health-sentinel.yml" 21600
          check_wf "refresh-thresholds.yml" 691200
          check_wf "time-travel-canary.yml" 691200

          RED_NAMES="${RED_NAMES#,}"
          RED_COUNT=0
          [ -n "$RED_NAMES" ] && RED_COUNT=$(echo "$RED_NAMES" | tr ',' '\n' | wc -l | tr -d ' ')
          echo "checked=${CHECKED} red_count=${RED_COUNT} red_names=${RED_NAMES:-none}"
          echo "red_count=${RED_COUNT}" >> "$GITHUB_OUTPUT"
          echo "red_names=${RED_NAMES}" >> "$GITHUB_OUTPUT"
          echo "RED_COUNT=${RED_COUNT}" >> "$GITHUB_ENV"

      - name: Write SELFHEAL_BEACON heartbeat (green days cost $0)
        env:
          GH_TOKEN: ${{ secrets.SELFHEAL_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BODY=$(printf '{"run_at":"%s","outcome":"ok","checked":5,"failing":%d,"fixed":0}' "$NOW" "${RED_COUNT}")
          if gh variable set SELFHEAL_BEACON --repo "$REPO" --body "$BODY"; then
            echo "beacon written: $BODY"
          else
            echo "::warning::SELFHEAL_BEACON write failed (SELFHEAL_PAT missing or expired?) — the hourly observer will flag the stale beacon within 26h."
          fi

  heal:
    needs: gate
    if: needs.gate.outputs.red_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT so the routine's pushes/PRs trigger CI and can be merged on green.
          token: ${{ secrets.SELFHEAL_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      # Pre-build the env the runbook's gates expect, so the agent spends its turns
      # fixing, not bootstrapping: the `.venv` (ruff/mypy/pytest live here) and the
      # dashboard deps.
      - name: Create repo venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name  "theheat-self-heal[bot]"
          git config user.email "theheat-self-heal@users.noreply.github.com"

      - name: Run workflow self-heal agent
        uses: anthropics/claude-code-action@v1
        env:
          # gh CLI inside the agent's Bash uses this. PAT when available so it can
          # write the SELFHEAL_BEACON variable and open CI-triggering PRs.
          GH_TOKEN: ${{ secrets.SELFHEAL_PAT || secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.SELFHEAL_PAT || secrets.GITHUB_TOKEN }}
          prompt: |
            You are the @theheat workflow self-heal agent, running headless in
            GitHub Actions because the keyless gate job found red/stale
            workflows: ${{ needs.gate.outputs.red_names }}

            Follow the runbook EXACTLY: docs/runbooks/workflow-self-heal.md
            Repo: ${{ github.repository }}.

            The environment is already set up for you:
            - `.venv` exists with ruff/mypy/pytest installed (use `.venv/bin/...`).
            - Dashboard deps are installed (`cd dashboard && npm test && npm run build`).
            - `gh` is authenticated; git identity is configured.

            Do the full loop: verify the gate's findings and detect anything it
            missed across all five scheduled workflows (and check
            source-health-sentinel's own liveness), fix red ones per the
            autonomy split (auto-merge MECHANICAL; open a PR and STOP for
            JUDGMENT/DESTRUCTIVE — anything touching tweet output or the
            voice-regression contract is JUDGMENT), respect the cross-run
            anti-thrash rule, and ALWAYS write the SELFHEAL_BEACON heartbeat at
            the end via `gh variable set` — even if you fixed nothing. (The
            gate already wrote a heartbeat when it ran; yours records the
            outcome and fixed count.)
          claude_args: |
            --model claude-haiku-4-5
            --max-turns 40
            --allowedTools Bash,Edit,Write,Read,Glob,Grep
