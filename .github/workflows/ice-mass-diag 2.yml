name: ice-mass-diag

# One-shot diagnostic — verifies the new src/data/ice_mass.py flow:
#   1. CMR lookup for the Greenland + Antarctica TIME_SERIES collections
#   2. GET the resolved granule URLs with EARTHDATA_TOKEN bearer auth
#   3. Report HTTP status + first few bytes of each response body
#
# Manual-trigger only. Burns zero LLM credits. Delete after use.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify CMR resolution + bearer fetch for both regions
        env:
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EARTHDATA_TOKEN:-}" ]; then
            echo "::error::EARTHDATA_TOKEN secret is empty or unset"
            exit 1
          fi
          echo "Token length: ${#EARTHDATA_TOKEN} chars (masked)"

          test_region() {
            local region="$1"
            local short_name="$2"

            echo ""
            echo "================================================================"
            echo "Region: $region — collection short_name=$short_name"
            echo "================================================================"

            echo "Step 1: CMR lookup..."
            cmr=$(curl -s -m 30 \
              "https://cmr.earthdata.nasa.gov/search/granules.json?short_name=${short_name}&page_size=1&sort_key=-start_date")
            url=$(echo "$cmr" | python3 -c '
import sys, json
d = json.load(sys.stdin)
for e in d.get("feed", {}).get("entry", []):
  for L in e.get("links", []):
    h = L.get("href", "")
    if h.startswith("https://archive.podaac.earthdata.nasa.gov/") and h.endswith(".txt") and "cumulus-protected" in h:
      print(h); sys.exit(0)
print("")
            ')

            if [ -z "$url" ]; then
              echo "::error::CMR returned no usable URL for $region"
              return 1
            fi
            echo "Resolved URL: $url"

            echo ""
            echo "Step 2: bearer-fetch the granule..."
            status=$(curl -sL -o /tmp/${region}_body.txt -D /tmp/${region}_headers.txt -w "%{http_code}" -m 60 \
              -H "Authorization: Bearer $EARTHDATA_TOKEN" "$url")

            echo "FINAL HTTP STATUS: $status"
            echo ""
            echo "First 6 lines of response body:"
            head -6 /tmp/${region}_body.txt || true

            case "$status" in
              200) echo "::notice::$region OK — 200 + body received."; return 0 ;;
              401) echo "::error::$region 401 — PO.DAAC Cumulus OPS app not authorized for this account."; return 2 ;;
              403) echo "::error::$region 403 — token authenticated but lacks scope."; return 3 ;;
              404) echo "::error::$region 404 — granule URL stale (CMR returned a URL that no longer resolves)."; return 4 ;;
              *)   echo "::warning::$region unexpected status $status."; return 5 ;;
            esac
          }

          # Track exit status across both regions so a single failure still surfaces.
          rc=0
          test_region "greenland" "GREENLAND_MASS_TELLUS_MASCON_CRI_TIME_SERIES_RL06.3_V4" || rc=$?
          test_region "antarctica" "ANTARCTICA_MASS_TELLUS_MASCON_CRI_TIME_SERIES_RL06.3_V4" || rc=$?
          exit "$rc"
