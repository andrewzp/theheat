name: writer-dryrun

# On-demand LIVE dry-run of a signal type's writer voice (E1 harness).
#
# Runs scripts/writer_dryrun.py inside Actions — where ANTHROPIC_API_KEY and
# GEMINI_API_KEY live as repo secrets — so a per-type fixture bundle (fires
# first: FIRMS hotspot or NIFC named complex, impact-carrying by default)
# goes through the REAL evidence contract → writer → safety → §F →
# fact-check → critic chain, with the decision-4 routing printed per
# candidate. This is the voice-iteration tool for prompt work; the A1
# pre-flip gate remains news-enrich-dryrun.yml, untouched.
#
# workflow_dispatch ONLY — never scheduled (it makes paid Anthropic + Gemini
# calls). It POSTS NOTHING and touches NO prod state: a dry-run only prints
# drafts; the live posting path is untouched.

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Signal type'
        type: choice
        options:
          - fire
          - fire_footprint
          - dust
          - cyclone_land_threat
          - precipitation_extreme
          - coral_bleaching
          - marine_heatwave
        default: 'fire'
      samples:
        description: 'Number of candidate drafts'
        default: '3'
      no_impact:
        description: 'Control run without human_impact (true/false)'
        default: 'false'
      frp:
        description: 'FRP MW (--type fire)'
        default: '595'
      hectares:
        description: 'Perimeter hectares (--type fire_footprint)'
        default: '103400'
      name:
        description: 'complex_name (--type fire_footprint)'
        default: 'Sierra Complex'
      record_path:
        description: 'daily_record fixture shape instead of multi_day_accumulation (--type precipitation_extreme; true/false)'
        default: 'false'
      country_cluster:
        description: 'country_precip_event fixture shape instead of multi_day_accumulation (--type precipitation_extreme; true/false)'
        default: 'false'
      dhw_value:
        description: 'DHW value in °C-weeks (--type coral_bleaching)'
        default: '24.5'
      mhw_streak_days:
        description: 'Streak days (--type marine_heatwave)'
        default: '12'

concurrency:
  group: writer-dryrun
  cancel-in-progress: false

jobs:
  dryrun:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run writer dry-run (live writer → fact-check → critic)
        # Inputs reach the shell ONLY via env (data, not code) — direct
        # `${{ inputs.* }}` interpolation into `run:` is a command-injection
        # seam in a step whose env holds API keys. Numeric knobs are
        # validated by argparse type coercion; --type is an Actions choice.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INPUT_TYPE: ${{ inputs.type }}
          INPUT_SAMPLES: ${{ inputs.samples }}
          INPUT_NO_IMPACT: ${{ inputs.no_impact }}
          INPUT_FRP: ${{ inputs.frp }}
          INPUT_HECTARES: ${{ inputs.hectares }}
          INPUT_NAME: ${{ inputs.name }}
          INPUT_RECORD_PATH: ${{ inputs.record_path }}
          INPUT_COUNTRY_CLUSTER: ${{ inputs.country_cluster }}
          INPUT_DHW_VALUE: ${{ inputs.dhw_value }}
          INPUT_MHW_STREAK_DAYS: ${{ inputs.mhw_streak_days }}
        # `|| true`: a clean kill is informative, not a job failure — this is
        # the voice-iteration tool (reganom-dryrun semantics), NOT a flip
        # gate; we want drafts + verdicts in the log however many ship.
        run: |
          EXTRA=""
          if [ "$INPUT_NO_IMPACT" = "true" ]; then EXTRA="--no-impact"; fi
          if [ "$INPUT_RECORD_PATH" = "true" ]; then EXTRA="$EXTRA --record-path"; fi
          if [ "$INPUT_COUNTRY_CLUSTER" = "true" ]; then EXTRA="$EXTRA --country-cluster"; fi
          python scripts/writer_dryrun.py \
            --type "$INPUT_TYPE" \
            --samples "$INPUT_SAMPLES" \
            --frp "$INPUT_FRP" \
            --hectares "$INPUT_HECTARES" \
            --name "$INPUT_NAME" \
            --dhw-value "$INPUT_DHW_VALUE" \
            --mhw-streak-days "$INPUT_MHW_STREAK_DAYS" \
            $EXTRA || true
