name: theheat-bot

on:
  schedule:
    # Auto-approval queue processing (hourly)
    - cron: '30 * * * *'
    # Daily leaderboard: 12:00 UTC (~8 AM ET)
    - cron: '0 12 * * *'
    # Alert polling: every 4 hours
    - cron: '0 0,4,8,16,20 * * *'
    # Note: the 12:00 UTC slot handles both leaderboard + alerts
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'alerts'
        type: choice
        options:
          - alerts
          - leaderboard
          - both
          - manual_tweet
          - auto_publish_due
      tweet_text:
        description: 'Tweet text (only used with manual_tweet mode)'
        required: false
        type: string
      draft_id:
        description: 'Draft id for approved draft posting'
        required: false
        type: string
      publish_intent_id:
        description: 'Idempotency token for approved draft posting'
        required: false
        type: string

concurrency:
  group: theheat-bot
  cancel-in-progress: false

jobs:
  test:
    # Full suite gates PR merges ONLY. Scheduled drafting runs no longer run it:
    # a flaky/time-dependent unit test must never be able to block — or redden —
    # production drafting. On 2026-06-19 a time-bomb unit test (hardcoded dates)
    # started failing and silently halted all drafting for 3 days, because the
    # run job below was `needs: test`. The run job now has its own fast,
    # deterministic Smoke gate instead (ruff + import), so genuinely broken main
    # still can't draft, but a unit-test flake can't dark the bot.
    #
    # Skip the `daily-plan-current` PR (#207): it is a rolling, content-only
    # DISPLAY PR that is never merged to main, so gating it on the Python +
    # dashboard suite is pointless — and its routine appends without rebasing
    # onto main, so it re-ran stale code and emailed a CI failure every day.
    # Skipping the test job here leaves both jobs skipped on that PR (run is
    # PR-excluded), so the run is neutral and sends no failure email.
    if: github.event_name == 'pull_request' && github.head_ref != 'daily-plan-current'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - run: pip install -r requirements.txt

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      # Lint via ruff. Config lives in pyproject.toml. Catches unused imports,
      # syntax issues, basic style. Fails fast before pytest so a broken-import
      # PR doesn't burn the full test budget.
      - run: ruff check src/ tests/

      # Type-check via mypy. Config in pyproject.toml. Three modules are
      # currently overridden (main, state, editorial.scoring) pending a
      # TypedDict refactor; remove overrides as files get cleaned up.
      - run: mypy src/

      # `voice_replay` tests live in tests/voice_regression/ and call the
      # real Anthropic writer. They run in voice-regression.yml on a
      # daily schedule, not on every PR.
      - run: python -m pytest tests/ -v -m "not voice_replay"

      - name: SQLite backend smoke
        run: |
          source .venv/bin/activate 2>/dev/null || true
          THEHEAT_DB_PATH=/tmp/theheat-smoke.sqlite python -m pytest tests/test_state.py -q -k "Sqlite" --tb=short

      - name: Test dashboard
        working-directory: dashboard
        run: npm test

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

  run:
    needs: test
    permissions:
      contents: read
      issues: write
    # Run job posts tweets, writes gist, consumes API quota — skip on PRs
    # so the test job alone gates the merge. PRs from forks also lack secrets.
    # Intentionally does NOT gate on the test result: the full suite is a
    # PR-merge gate, not a production-run gate (the test job is skipped on
    # schedules). Drafting must survive a flaky unit test; the Smoke gate step
    # below is the real guard against a genuinely broken build. Drafts are
    # manual-gated (human review before posting), so the residual risk is a
    # rejected draft, not a bad tweet — far cheaper than a multi-day outage.
    if: |
      always()
      && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 * * * *" ]; then
            echo "mode=auto_publish_due" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "12" ]; then
            # 12:00 UTC run = leaderboard + alerts
            echo "mode=both" >> $GITHUB_OUTPUT
          else
            echo "mode=alerts" >> $GITHUB_OUTPUT
          fi

      - name: Restore station thresholds cache
        id: thresholds-cache
        if: steps.mode.outputs.mode == 'alerts' || steps.mode.outputs.mode == 'both'
        uses: actions/cache@v4
        with:
          path: data/station_thresholds.sqlite
          key: ghcn-thresholds-${{ runner.os }}-${{ hashFiles('data/station_thresholds.version') }}
          restore-keys: |
            ghcn-thresholds-${{ runner.os }}-

      - name: Download station thresholds
        if: |
          (steps.mode.outputs.mode == 'alerts' || steps.mode.outputs.mode == 'both')
          && steps.thresholds-cache.outputs.cache-hit != 'true'
        # Required when THEHEAT_SIGNALS_PROVIDER=ghcn. The SQLite file is stored
        # as a GH Release asset (not raw-committed) to avoid binary churn.
        # Leaderboard and auto-publish runs do not touch the GHCN path.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          for i in 1 2 3 4 5; do
            if gh release download thresholds-latest \
              --pattern "station_thresholds.sqlite" \
              --dir data/ \
              --clobber; then
              break
            fi
            echo "[thresholds] download failed, retry $i/5"
            sleep 20
          done

      - name: Validate station thresholds
        if: steps.mode.outputs.mode == 'alerts' || steps.mode.outputs.mode == 'both'
        run: |
          test -s data/station_thresholds.sqlite
          if [ -f data/station_thresholds.version ]; then
            echo "[thresholds] cache version:"
            cat data/station_thresholds.version
          fi
          python3 - <<'PYEOF'
          import sqlite3
          conn = sqlite3.connect("data/station_thresholds.sqlite")
          active = conn.execute("SELECT COUNT(*) FROM stations WHERE is_active=1").fetchone()[0]
          thresh = conn.execute("SELECT COUNT(*) FROM thresholds").fetchone()[0]
          if active < 1000 or thresh < 1000:
              raise SystemExit(f"threshold DB failed sanity check: active={active}, thresholds={thresh}")
          print(f"[thresholds] active={active:,} thresholds={thresh:,}")
          conn.close()
          PYEOF

      # Fast, deterministic guard that replaces the full-suite gate for production
      # runs: a genuinely broken main (syntax / bad import / circular import) still
      # cannot draft, but there are no time-dependent or flaky unit tests here.
      # ruff + import are stable and take seconds. `import src.main` is verified
      # side-effect-free (no secrets/env needed to import).
      - name: Smoke gate
        run: |
          ruff check src/
          python -c "import src.main"

      - name: Run bot
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          NASA_FIRMS_API_KEY: ${{ secrets.NASA_FIRMS_API_KEY }}
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          # Required for GPM IMERG precipitation and GRACE-FO ice mass.
          # Use a NASA Earthdata application token.
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          # Bound per-cycle point OPeNDAP requests; full city scans are too slow
          # for the scheduled alerts job.
          GPM_IMERG_MAX_CITIES: "75"
          # Fetch bounded city batches concurrently after strict-mode probes catch
          # broken auth/provider-wide failures.
          GPM_IMERG_MAX_WORKERS: "8"
          # Optional repo-variable knobs for NASA GES DISC behavior. Empty vars
          # fall back to code defaults.
          GPM_IMERG_TIMEOUT_S: ${{ vars.GPM_IMERG_TIMEOUT_S }}
          GPM_IMERG_RETRY_BACKOFF_S: ${{ vars.GPM_IMERG_RETRY_BACKOFF_S }}
          GPM_IMERG_MAX_LOOKBACK_DAYS: ${{ vars.GPM_IMERG_MAX_LOOKBACK_DAYS }}
          # GPM IMERG fetch path: opendap (legacy per-city, default) | datapool
          # (one authenticated HTTPS grid download, different host) | s3 (direct
          # GetObject from the cumulus bucket). Both alternates escape the
          # overloaded gpm1.gesdisc OPeNDAP host and fall back to opendap on any
          # failure. Flip to activate: gh variable set THEHEAT_GPM_SOURCE --body datapool --repo andrewzp/theheat
          THEHEAT_GPM_SOURCE: ${{ vars.THEHEAT_GPM_SOURCE || 'opendap' }}
          # Triage stage active: MVP infra in PR #132, coral_dhw migrated in PR #134.
          # Kill-switch default in code stays "0"; production overrides here.
          # Rollback: gh variable set THEHEAT_TRIAGE_ENABLED --body 0 --repo andrewzp/theheat
          THEHEAT_TRIAGE_ENABLED: ${{ vars.THEHEAT_TRIAGE_ENABLED || '1' }}
          # Optional concurrent source scheduler. Default is legacy sequential
          # execution; flipping is an explicit operator action.
          THEHEAT_CONCURRENT_SOURCES: ${{ vars.THEHEAT_CONCURRENT_SOURCES || '0' }}
          THEHEAT_CRITIC_ENABLED: ${{ vars.THEHEAT_CRITIC_ENABLED || '1' }}
          THEHEAT_WRITER_SAMPLES: ${{ vars.THEHEAT_WRITER_SAMPLES || '1' }}
          THEHEAT_CRITIC_REVISE_ENABLED: ${{ vars.THEHEAT_CRITIC_REVISE_ENABLED || '0' }}
          THEHEAT_MAX_DRAFTS_PER_CYCLE: ${{ vars.THEHEAT_MAX_DRAFTS_PER_CYCLE || '3' }}
          THEHEAT_ENGAGEMENT_WINDOW_ENABLED: ${{ vars.THEHEAT_ENGAGEMENT_WINDOW_ENABLED || '0' }}
          # Reanalysis regional-anomaly signal (Part B, PR #203). manual_only +
          # env-gated; code default stays "0" (dormant). Production controls it via
          # the repo variable. Activate: gh variable set THEHEAT_REGANOM_ENABLED --body 1 --repo andrewzp/theheat
          # Rollback: gh variable set THEHEAT_REGANOM_ENABLED --body 0 --repo andrewzp/theheat
          THEHEAT_REGANOM_ENABLED: ${{ vars.THEHEAT_REGANOM_ENABLED || '0' }}
          # Newsworthiness lane (Bet A phase 0) — default OFF; zero editorial
          # surface when ON (retrieval + state + gap watch only).
          # Activate: gh variable set THEHEAT_NEWSWORTHINESS_ENABLED --body 1 --repo andrewzp/theheat
          # Rollback: gh variable set THEHEAT_NEWSWORTHINESS_ENABLED --body 0 --repo andrewzp/theheat
          THEHEAT_NEWSWORTHINESS_ENABLED: ${{ vars.THEHEAT_NEWSWORTHINESS_ENABLED || '0' }}
          # Bet A phase A1 (enrich) — default OFF; needs the master flag ON too.
          # When ON: verified news events attach human_impact to matched
          # bundles; impact-citing drafts are FORCED manual_only (decision 4).
          # Activate: gh variable set THEHEAT_NEWS_ENRICH_ENABLED --body 1 --repo andrewzp/theheat
          # Rollback: gh variable set THEHEAT_NEWS_ENRICH_ENABLED --body 0 --repo andrewzp/theheat
          THEHEAT_NEWS_ENRICH_ENABLED: ${{ vars.THEHEAT_NEWS_ENRICH_ENABLED || '0' }}
          # Bet A phase A2 (boost) — default OFF; needs the master flag ON too.
          # When ON: a sourced news match rescues NEAR-miss fire scores
          # (flat +8, floor threshold-8, provenance in score.reasons).
          # Activate: gh variable set THEHEAT_NEWS_BOOST_ENABLED --body 1 --repo andrewzp/theheat
          # Rollback: gh variable set THEHEAT_NEWS_BOOST_ENABLED --body 0 --repo andrewzp/theheat
          THEHEAT_NEWS_BOOST_ENABLED: ${{ vars.THEHEAT_NEWS_BOOST_ENABLED || '0' }}
          # Throughput Initiative (2026-06-16). All default "0"/safe in code;
          # production controls them via repo variables. Activate in order
          # A->B->C->D per docs/2026-06-16_throughput-activation-runbook.md.
          # NOTE: AUTOSHIP_ON_CRITIC_PASS posts LIVE to @theheat.
          # Rollback any: gh variable set <NAME> --body 0 --repo andrewzp/theheat
          THEHEAT_FUNNEL_TELEMETRY: ${{ vars.THEHEAT_FUNNEL_TELEMETRY || '0' }}
          THEHEAT_AUTOSHIP_ON_CRITIC_PASS: ${{ vars.THEHEAT_AUTOSHIP_ON_CRITIC_PASS || '0' }}
          THEHEAT_AUTOSHIP_MAX_AGE_H: ${{ vars.THEHEAT_AUTOSHIP_MAX_AGE_H || '36' }}
          THEHEAT_REFILL_ENABLED: ${{ vars.THEHEAT_REFILL_ENABLED || '0' }}
          THEHEAT_DRAFTS_TARGET_PER_CYCLE: ${{ vars.THEHEAT_DRAFTS_TARGET_PER_CYCLE || '3' }}
          THEHEAT_REFILL_MAX_ATTEMPTS: ${{ vars.THEHEAT_REFILL_MAX_ATTEMPTS }}
          THEHEAT_MULTISIGNAL_CONTEXT: ${{ vars.THEHEAT_MULTISIGNAL_CONTEXT || '0' }}
          # Optional repo-variable knobs for pending-queue diversity and TTL.
          THEHEAT_PENDING_TYPE_CAP: ${{ vars.THEHEAT_PENDING_TYPE_CAP }}
          # Default TTL = fast point-in-time signals (7d). Slow continuous
          # signals (coral/DHW) use THEHEAT_PENDING_TTL_DAYS_SLOW (21d) so a
          # weeks-long bleaching event's drafts aren't discarded as "stale".
          THEHEAT_PENDING_TTL_DAYS: ${{ vars.THEHEAT_PENDING_TTL_DAYS }}
          THEHEAT_PENDING_TTL_DAYS_SLOW: ${{ vars.THEHEAT_PENDING_TTL_DAYS_SLOW }}
          # "both" = GHCN (deep US NOAA station records) + Open-Meteo (curated
          # world cities incl. Europe), partitioned US/non-US in run_extreme_signals.
          # GHCN alone is blind outside the US (it missed the deadly June 2026
          # European heatwave); "both" restores global coverage without losing US depth.
          # "ghcn" = US-only stations; "open_meteo" = curated cities only.
          # Rollback: set back to "ghcn" and push — next cycle reverts instantly.
          THEHEAT_SIGNALS_PROVIDER: both
          TWEET_TEXT: ${{ github.event.inputs.tweet_text }}
          DRAFT_ID: ${{ github.event.inputs.draft_id }}
          PUBLISH_INTENT_ID: ${{ github.event.inputs.publish_intent_id }}
        run: python -m src.main ${{ steps.mode.outputs.mode }}

      - name: Open issue on scheduled-run failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Bot cycle failed: ${{ github.run_id }}"
          gh issue create --title "$title" \
            --label "source-health-sentinel,ours" \
            --body "Scheduled run failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} — mode schedule ${{ github.event.schedule }}. Investigate; close when resolved." \
            || true
