name: refresh-thresholds

on:
  schedule:
    # Every Sunday at 02:00 UTC — well after NOAA's ~21 UTC daily publish
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to look back in superghcnd_diff'
        required: false
        default: '8'
        type: string

concurrency:
  group: refresh-thresholds
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # needed for gh release upload

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Download station_thresholds.sqlite from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          gh release download thresholds-latest \
            --pattern "station_thresholds.sqlite" \
            --dir data/ \
            --clobber
          test -s data/station_thresholds.sqlite

      - name: Refresh station inventory
        run: python -m scripts.refresh_station_inventory --db data/station_thresholds.sqlite

      - name: Apply incremental threshold updates
        run: |
          DAYS=${{ github.event.inputs.days || '8' }}
          python -m scripts.update_thresholds_incremental \
            --db data/station_thresholds.sqlite \
            --days $DAYS

      - name: Show DB stats
        run: |
          python3 - <<'PYEOF'
          import sqlite3
          conn = sqlite3.connect("data/station_thresholds.sqlite")
          stations = conn.execute("SELECT COUNT(*) FROM stations").fetchone()[0]
          active   = conn.execute("SELECT COUNT(*) FROM stations WHERE is_active=1").fetchone()[0]
          thresh   = conn.execute("SELECT COUNT(*) FROM thresholds").fetchone()[0]
          watermark = conn.execute("SELECT value FROM meta WHERE key='last_diff_date'").fetchone()
          if active < 1000 or thresh < 1000:
              raise SystemExit(f"DB sanity check failed: active={active}, thresholds={thresh}")
          print(f"Stations: {stations:,} ({active:,} active)")
          print(f"Thresholds: {thresh:,}")
          print(f"Watermark: {watermark[0] if watermark else 'not set'}")
          conn.close()
          PYEOF

      - name: Upload updated SQLite as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="thresholds-latest"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" \
            --title "Latest station thresholds" \
            --notes "Auto-updated by refresh-thresholds workflow."
          gh release upload "$TAG" data/station_thresholds.sqlite --clobber
          echo "Uploaded station_thresholds.sqlite as release $TAG"

      - name: Write threshold cache version
        run: |
          {
            echo "release=thresholds-latest"
            echo "sha256=$(sha256sum data/station_thresholds.sqlite | awk '{print $1}')"
            echo "bytes=$(wc -c < data/station_thresholds.sqlite | tr -d ' ')"
            python3 - <<'PYEOF'
          import sqlite3
          conn = sqlite3.connect("data/station_thresholds.sqlite")
          active = conn.execute("SELECT COUNT(*) FROM stations WHERE is_active=1").fetchone()[0]
          thresh = conn.execute("SELECT COUNT(*) FROM thresholds").fetchone()[0]
          watermark = conn.execute("SELECT value FROM meta WHERE key='last_diff_date'").fetchone()
          print(f"last_diff_date={watermark[0] if watermark else ''}")
          print(f"active_stations={active}")
          print(f"threshold_rows={thresh}")
          conn.close()
          PYEOF
          } > data/station_thresholds.version
          cat data/station_thresholds.version

      - name: Commit updated stations.csv and threshold cache version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/stations.csv data/station_thresholds.version
          git diff --cached --quiet || git commit -m "chore: refresh stations.csv [skip ci]"
          git push origin HEAD:main || echo "Nothing to push"
