name: voice-regression

# Live writer-replay regression + daily billing canary.
#
# Cost (measured 2026-07-13 — the previous header's "$6/month" was 5× stale
# against the observed ~$30/month nightly bill):
#   weekly full suite   ~$1.00/run × 4.3/mo  ≈ $4.3/month
#   daily canary        ~$0.08/run × 30/mo   ≈ $2.4/month
#   PR-gated full runs  ~$1.00 × writer-path PRs (typically 0–4/mo)
#   total ≈ $7–9/month worst case, ~$5–7 typical (was ~$30/month nightly).
#
# Triggers (economics master plan P0.4):
#   - pull_request (automatic) when the PR touches the writer prompt or the
#     writer itself: src/two_bot/prompts/** or src/two_bot/writer.py. The
#     suite goes red on the exact PRs that can break the voice. Advisory
#     gate: the repo's only *required* check is `test` (a path-filtered
#     required check would wedge unrelated PRs as "expected"), but merge
#     discipline treats ANY red check as blocking (INDEX §Standing rules).
#   - pull_request with label `voice-check`: opt-in full run for any other
#     PR (label persists across pushes).
#   - schedule daily 09:17 UTC: 3-fixture billing + voice canary — the
#     outage tripwire. 2026-07-11: the Anthropic balance hit $0 and drafting
#     stopped SILENTLY (bot.yml tolerates writer failures); the nightly full
#     suite was the only loud signal. The canary keeps that tripwire at ~3%
#     of the old cost and fails RED on billing/auth errors and on a missing
#     key (a skipped canary is no canary).
#   - schedule weekly Sunday 09:00 UTC: full replay suite.
#   - workflow_dispatch: manual full suite.

on:
  schedule:
    - cron: '17 9 * * *'   # daily canary (3 fixtures)
    - cron: '0 9 * * 0'    # weekly full suite (Sunday)
  workflow_dispatch: {}
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  # Per-PR group so rapid pushes cancel the stale paid run; scheduled and
  # manual runs keep unique groups and never cancel each other.
  group: voice-regression-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Keyless PR gate: does this PR touch the writer path? ($0 — no model call)
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      writer_paths: ${{ steps.filter.outputs.writer_paths }}
    steps:
      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CHANGED=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --json files -q '.files[].path')
          echo "changed files:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^src/two_bot/(prompts/|writer\.py$)'; then
            echo "writer_paths=true" >> "$GITHUB_OUTPUT"
          else
            echo "writer_paths=false" >> "$GITHUB_OUTPUT"
          fi

  replay:
    # Full suite: weekly cron, manual dispatch, writer-path PRs, labeled PRs.
    needs: [changes]
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'schedule' && github.event.schedule == '0 9 * * 0') ||
        (github.event_name == 'pull_request' &&
          (github.event.action != 'labeled' || github.event.label.name == 'voice-check') &&
          (needs.changes.outputs.writer_paths == 'true' ||
           contains(github.event.pull_request.labels.*.name, 'voice-check')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run voice-regression replay (full suite)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m pytest tests/voice_regression/ -v -m voice_replay

  canary:
    # Daily 3-fixture billing + voice canary — the outage tripwire.
    if: github.event_name == 'schedule' && github.event.schedule == '17 9 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run daily canary (3 fixtures, billing error = RED)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m pytest tests/voice_regression/ -v -m voice_canary
