name: source-health-sentinel

# Turns every currently-failing source into a tracked GitHub issue so the
# operator never has to watch the dashboard. Every failure is a product gap, so
# every failing source gets an issue (labeled `ours` vs `external` so the fix is
# obvious); issues auto-close when the source recovers. The classifier and the
# create/close plan live in scripts/source_health_sentinel.py and are
# unit-tested; this workflow fetches the gist and runs the reconciler.

on:
  schedule:
    # Hourly at :30. The reconciler is idempotent, so frequent runs never spam:
    # it only creates an issue a source doesn't already have, and it can now
    # detect a stale alerts lane within a few hours even if auto_publish_due runs
    # keep writing fresh state.
    - cron: '30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: source-health-sentinel
  cancel-in-progress: false

jobs:
  sentinel:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Fetch state.json from gist
        env:
          GH_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
        run: gh gist view "${{ secrets.GIST_ID }}" -f state.json > /tmp/state.json

      # Opens an issue for each currently-failing source, closes the issue of any
      # source that has recovered. Runs live because GITHUB_ACTIONS=true.
      - name: Reconcile source-failure issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/source_health_sentinel.py /tmp/state.json
