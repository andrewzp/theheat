<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="The Heat — Twitter avatar">
  <!-- Paper background. Twitter applies its own circular crop. -->
  <rect width="400" height="400" fill="#FAFAF7"/>

  <!-- Mark scaled to fill ~65% of the avatar diameter, centered. -->
  <g transform="translate(50 56) scale(3.0)">
    <rect x="46.5" y="6" width="7" height="62" rx="3.5" fill="#16181B"/>
    <circle cx="50" cy="76" r="14" fill="#16181B"/>
    <circle cx="50" cy="76" r="7" fill="#C2410C"/>
  </g>
</svg>
