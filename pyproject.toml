[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    ".venv",
    "data",
    "dashboard/.next",
    "dashboard/node_modules",
]

[tool.ruff.lint]
# Start permissive — pyflakes (F) catches real bugs (unused imports, undefined
# names), pycodestyle (E, W) catches obvious style issues. Add bugbear (B)
# and pyupgrade (UP) once the baseline is clean.
select = ["E", "F", "W"]
ignore = [
    # Long lines (E501) — handled by formatter, no need to police separately.
    "E501",
    # Module-level imports not at top (E402) — codebase intentionally puts
    # `from __future__ import annotations` before the docstring across ~18
    # files. Mass-reordering would bloat this PR; revisit when we add UP rules.
    "E402",
]

[tool.ruff.lint.per-file-ignores]
# Tests legitimately use unused imports for fixture side effects, and
# import * style assertions.
"tests/**/*.py" = ["F401", "F403", "F405"]

[tool.pytest.ini_options]
# --ignore-glob skips macOS/iCloud sync-conflict duplicates ("name 2.py"), which
# are gitignored (.gitignore `* 2.py`) so CI never sees them, but pytest collects
# them locally and runs STALE copies of real tests (the space-digit suffix is how
# iCloud names a conflicted copy). Without this, a stale " 2.py" can fail while
# the real test passes — confusing, local-only double failures.
addopts = "-m 'not voice_replay' --ignore-glob='* [0-9].py'"
markers = [
    "voice_replay: live writer-replay test (calls real Anthropic API; skipped by default, run via the voice-regression workflow)",
    "allow_network: opt out of the hermeticity gate and allow real outbound connections",
    "real_backoff: opt out of the no-op retry backoff fixture and run real retry sleeps",
]

[tool.mypy]
# Permissive baseline. Goal: catch boundary-layer bugs (the "verify the wire"
# class) and obvious type errors WITHOUT requiring full type annotation of
# every function. Tighten over time.
python_version = "3.12"
ignore_missing_imports = true       # third-party libs (tweepy, atproto, etc.) ship no stubs
check_untyped_defs = true           # type-check the body of unannotated functions
warn_unused_ignores = true          # surfaces stale `# type: ignore` comments
warn_redundant_casts = true
no_implicit_optional = true         # require explicit Optional[T] for default-None args
follow_imports = "silent"           # don't crash on missing imports inside imported modules
exclude = [
    "tests/",                       # test code is intentionally loose; revisit later
    "dashboard/",                   # JS/TS, not Python
    "scripts/",                     # one-off operational scripts
    "data/",
]

# Per-module overrides. The ignore_errors blocks for src.main /
# src.state / src.editorial.scoring were removed in the BotState
# TypedDict pass; those modules now type-check cleanly via the
# nested TypedDicts in src/state_schema.py.
[[tool.mypy.overrides]]
module = "src.voice.generator"
# Voice generator has many template helpers with primitive arg types;
# most don't need annotations.
disallow_untyped_defs = false
